trading:
  # 当前激活的策略：aggressive | mean-reversion
  strategy: aggressive

  okx:
    inst-id: BTC-USDT       # 交易对
    timeframe: 15m          # K线周期
    limit: 60               # 每次拉取K线数量（60根足够ATR计算）

  scheduler:
    interval-ms: 900000     # 信号生成定时任务间隔（15分钟 = 900000ms）

  signal:
    output-file: signal.json

  # ── 代理配置（本地测试时开启）──────────────────────────────────────
  proxy:
    enabled: true
    host: 127.0.0.1
    port: 7890

  # ── OKX 交易 API ────────────────────────────────────────────────────
  trade-api:
    enabled: true          # true=启用自动下单，false=仅发邮件
    api-key: ""             # OKX API Key
    secret-key: ""          # OKX Secret Key
    passphrase: ""          # OKX Passphrase
    simulated: true         # true=模拟盘，false=实盘（慎用）
    leverage: 20            # 杠杆倍数

  # ── 邮件通知 ────────────────────────────────────────────────────────
  email:
    enabled: true
    sender-email: jiangyuxuan7355608@gmail.com    # Gmail 发件地址
    app-password:       # Gmail 应用专用密码（非登录密码）
    receiver-email: jiangyuxuan7355608@gmail.com   # 收件地址
    cooldown-ms: 300000     # 邮件冷却时间（5分钟）

  # ── AI Agent 配置 ────────────────────────────────────────────────────
  agent:
    enabled: false                            # 是否启用自动策略切换
    api-key: ""                               # OpenRouter API Key（sk-or-...）
    model: "anthropic/claude-sonnet-4-5"      # 使用的模型，支持任意 OpenRouter 模型
    temperature: 0.3                          # 采样温度，越低越保守
    max-tokens: 2048                          # 单次最大输出 token 数（空间够大，保证 reason 字段完整）

  # ── 回测配置 ────────────────────────────────────────────────────────
  backtest:
    initial-capital: 200.0  # 初始本金（USDT）
    leverage: 20            # 杠杆倍数
    data-dir: backtest-data # 数据存储目录

# Spring Boot 基础配置
spring:
  application:
    name: trading-signal-engine

server:
  port: 10086

logging:
  level:
    com.trading.signal: INFO
