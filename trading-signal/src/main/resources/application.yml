trading:
  # 当前激活的策略：aggressive | conservative
  strategy: aggressive

  okx:
    inst-id: BTC-USDT       # 交易对
    timeframe: 15m           # K线周期：15分钟（比1m噪音更少，结构更清晰）
    limit: 100               # 每次拉取K线数量
                             # 15m K线：100根 = 25小时，足够 EMA/均量计算预热
                             # 1m时用50根即可，15m需要更多覆盖足够的历史

  scheduler:
    interval-ms: 900000      # 信号生成定时任务间隔（毫秒）
                             # 15分钟 = 900000ms，与K线周期对齐
                             # 每根K线收盘后分析一次，避免在K线中途产生噪音信号

  signal:
    output-file: signal.json # 信号输出文件路径

  # ── 代理配置（本地测试时开启，生产环境关闭）──────────────────────────
  proxy:
    enabled: true            # true=开启代理，false=关闭
    host: 127.0.0.1          # Clash 默认本地地址
    port: 7897               # Clash 默认 HTTP 代理端口


  email:
    enabled: true                        # 改为 true 开启邮件通知
    sender-email: jiangyuxuan7355608@gmail.com    # Gmail 发件地址
    app-password:  xxx     # Gmail 应用专用密码（非登录密码）
    receiver-email: jiangyuxuan7355608@gmail.com   # 收件地址
    min-confidence: 0.6                   # 触发邮件的最低置信度（0.0~1.0）
    cooldown-ms: 300000                   # 同方向信号冷却时间（毫秒），默认5分钟

  # ── 策略参数（所有写死的参数都在这里，修改后重启生效）──────────────────
  params:

    # ── MarketAnalyzer 分析参数 ──────────────────────────────────────────

    # 短期横盘判断窗口（根数）
    # 用于判断最近N根K线是否处于横盘状态
    # 值越小：对短期横盘更敏感，信号更多但质量下降
    # 值越大：需要更长时间的横盘才触发，信号更少但更可靠
    # 建议范围：4~10，默认6
    range-window: 6

    # 横盘判断阈值（价格波动幅度）
    # (maxHigh - minLow) / minLow < 此值 → 判定为横盘
    # 15m K线：0.008 = 0.8%，6根15m K线（90分钟）内波动不超过0.8%才算横盘
    # 1m时用0.006，15m波动天然更大，阈值需要相应放宽
    # 建议范围：0.006~0.015，默认0.008
    range-threshold: 0.006

    # 长期突破验证窗口（根数）
    # 用于双窗口突破验证：短期突破必须同时突破此窗口的高低点才算有效
    # 值越大：突破门槛越高，假突破越少，但信号也越少
    # 建议范围：10~20，默认14
    breakout-window-long: 14

    # 成交量均量计算窗口（根数）
    # 用于计算平均成交量基准，判断是否放量
    # 值越大：均量基准越稳定，不容易被短期低量拉低基准
    # 建议范围：15~30，默认20
    vol-window: 20

    # 放量判断倍数
    # 最新成交量 > 均量 × 此值 → 判定为放量
    # 1.5 = 超过均量50%才算放量
    # 值越大：放量门槛越高，信号越少但质量越高
    # 建议范围：1.3~2.5，默认1.5
    volume-spike-multiplier: 1.5

    # EMA短期周期（用于趋势方向判断）
    # EMA5 vs EMA20 判断短期趋势偏向
    # 值越小：对趋势变化越敏感，但噪音也越多
    # 建议范围：3~8，默认5
    ema-short: 5

    # EMA长期周期（用于趋势方向判断）
    # 建议范围：15~30，默认20
    ema-long: 20

    # 趋势判定阈值
    # EMA5与EMA20的差值超过此比例才判定为有方向趋势
    # 0.0002 = 0.02%，差值太小时判定为震荡（neutral）
    # 值越大：趋势判定越严格，neutral状态越多
    # 建议范围：0.0001~0.0005，默认0.0002
    trend-threshold: 0.0002

    # ── AggressiveStrategy 激进策略参数 ─────────────────────────────────

    # 风险回报比（激进策略）
    # 止盈距离 = 止损距离 × 此值
    # 3.0 = 止盈是止损的3倍，即赚3亏1
    # 建议范围：1.5~3.0，默认3.0
    agg-risk-reward-ratio: 3.0

    # 最小止损比例兜底（激进策略）
    # 当前一根K线中点离入场价太近时，用此值保底
    # 0.002 = 0.2%，防止止损距离过小被正常波动打掉
    # 建议范围：0.001~0.004，默认0.002
    agg-min-sl-pct: 0.008

    # 区间中部过滤下界（激进策略）
    # 价格在区间 [此值, 上界] 之间时禁止进场
    # 0.30 = 价格在区间30%以下才允许做空方向进场
    # 建议范围：0.20~0.40，默认0.30
    agg-mid-range-lower: 0.30

    # 区间中部过滤上界（激进策略）
    # 0.70 = 价格在区间70%以上才允许做多方向进场
    # 建议范围：0.60~0.80，默认0.70
    agg-mid-range-upper: 0.70

    # 扫单K线振幅阈值（激进策略）
    # (high - low) / close > 此值 → 可能是扫单K线（需配合实体比判断）
    # 15m K线：0.015 = 1.5%，15分钟内振幅超过1.5%才触发扫单检测
    # 1m时用0.01，15m K线天然振幅更大，阈值需要放宽，否则会过滤掉正常趋势K
    # 建议范围：0.012~0.025，默认0.015
    agg-sweep-amplitude: 0.015

    # 扫单K线实体比阈值（激进策略）
    # abs(close - open) / (high - low) < 此值 → 实体小，可能是扫单针
    # 需同时满足振幅阈值才判定为扫单
    # 0.50 = 实体占K线总长度不足50%时视为扫单针
    # 建议范围：0.40~0.60，默认0.50
    agg-sweep-body-ratio: 0.50

    # 强信号仓位（激进策略，有强延续确认时）
    # 占本金比例，0.30 = 30%本金
    # 200U × 30% × 20倍 = 1200U名义仓位，止损0.5% → 亏6U（本金3%）
    # 建议范围：0.20~0.40，默认0.30
    agg-position-strong: 0.5

    # 弱信号仓位（激进策略，仅单根延续时）
    # 0.15 = 15%本金，试探仓位
    # 200U × 15% × 20倍 = 600U名义仓位，止损0.5% → 亏3U（本金1.5%）
    # 建议范围：0.10~0.20，默认0.15
    agg-position-weak: 0.1

    # 激进策略同方向信号冷却时间（毫秒）
    # 同方向信号在此时间内不重复触发，防止同一行情叠加开仓
    # 15m K线：2700000 = 45分钟（3根K线），避免同一波行情连续进场
    # 1m时用300000（5分钟），15m周期信号本身已经很少，冷却时间相应延长
    # 建议范围：1800000~5400000（30~90分钟），默认2700000
    agg-cooldown-ms: 2700000

    # ── ConservativeStrategy 保守策略参数 ───────────────────────────────

    # 风险回报比（保守策略）
    # 建议范围：1.5~3.0，默认1.5
    con-risk-reward-ratio: 1.5

    # 最小止损比例兜底（保守策略）
    # 建议范围：0.001~0.004，默认0.003
    con-min-sl-pct: 0.008

    # 标准仓位（保守策略，无横盘蓄力时）
    # 0.20 = 20%本金
    # 建议范围：0.15~0.25，默认0.20
    con-position-base: 0.20

    # 加强仓位（保守策略，有横盘蓄力时）
    # isRange=true 时使用，横盘突破+延续是最高质量信号
    # 0.25 = 25%本金
    # 建议范围：0.20~0.35，默认0.25
    con-position-bonus: 0.2

    # 保守策略同方向信号冷却时间（毫秒）
    # 比激进策略更长，信号更稀少但质量更高
    # 15m K线：5400000 = 90分钟（6根K线）
    # 建议范围：3600000~10800000（60~180分钟），默认5400000
    con-cooldown-ms: 5400000

  # ── 回测配置 ──────────────────────────────────────────────────────────
  backtest:
    # 回测初始本金（U）
    initial-capital: 200.0
    # 回测杠杆倍数
    leverage: 20
    # 回测数据存储目录
    data-dir: backtest-data
    # 每月回测报告邮件主题前缀
    report-subject: "[月度回测报告] BTC交易策略"

# Spring Boot 基础配置
spring:
  application:
    name: trading-signal-engine

server:
  port: 8080

logging:
  level:
    com.trading.signal: INFO
