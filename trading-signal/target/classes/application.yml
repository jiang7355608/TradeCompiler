trading:
  # 当前激活的策略：aggressive | mean-reversion
  strategy: aggressive

  okx:
    inst-id: BTC-USDT       # 交易对
    timeframe: 15m          # K线周期
    limit: 60               # 每次拉取K线数量（60根足够ATR计算）

  scheduler:
    interval-ms: 900000     # 信号生成定时任务间隔（15分钟 = 900000ms）

  signal:
    output-file: signal.json

  # ── 代理配置（本地测试时开启）──────────────────────────────────────
  proxy:
    enabled: false
    host: 127.0.0.1
    port: 7897

  # ── OKX 交易 API ────────────────────────────────────────────────────
  trade-api:
    enabled: false          # true=启用自动下单，false=仅发邮件
    api-key: ""
    secret-key: ""
    passphrase: ""
    simulated: true         # true=模拟盘，false=实盘
    leverage: 20

  # ── 邮件通知 ────────────────────────────────────────────────────────
  email:
    enabled: false
    sender-email: your-email@gmail.com
    app-password: ""        # Gmail 应用专用密码
    receiver-email: your-email@gmail.com
    cooldown-ms: 300000     # 邮件冷却时间（5分钟）

  # ── 回测配置 ────────────────────────────────────────────────────────
  backtest:
    initial-capital: 200.0  # 初始本金（USDT）
    leverage: 20            # 杠杆倍数
    data-dir: backtest-data # 数据存储目录

# Spring Boot 基础配置
spring:
  application:
    name: trading-signal-engine

server:
  port: 10086

logging:
  level:
    com.trading.signal: INFO
